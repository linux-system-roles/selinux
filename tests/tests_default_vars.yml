---
- name: Ensure that the role declares all parameters in defaults
  hosts: all
  tasks:
    - name: Run the role
      include_tasks: tasks/run_role_with_clear_facts.yml
      vars:
        __sr_public: true

    - name: Assert that the role declares all parameters in defaults
      assert:
        that: vars[item] is defined
      loop:
        - selinux_state
        - selinux_policy
        - selinux_booleans
        - selinux_fcontexts
        - selinux_logins
        - selinux_ports
        - selinux_restore_dirs
        - selinux_all_purge
        - selinux_booleans_purge
        - selinux_fcontexts_purge
        - selinux_ports_purge
        - selinux_logins_purge
