---
- name: Ensure ansible_facts used by role
  setup:
    gather_subset: "{{ __selinux_required_facts_subsets }}"
  when: __selinux_required_facts |
    difference(ansible_facts.keys() | list) | length > 0

- name: Record role begin fingerprint
  sr_fingerprint:
    sr_message: >-
      begin system_role:selinux ansible_version={{ ansible_version.full }}
      {{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}

- name: Ensure SELinux packages
  include_tasks: ensure_selinux_packages.yml
